{% extends "base.html" %}
{% block title %}Yeni Site Belgesi · Site Aidatları{% endblock %}

{% block content %}
<div class="caption">Site Aidatları / Site Belgesi / Yeni</div>
<h1 style="margin:6px 0 14px;">Yeni Site Belgesi</h1>

<div class="card" style="padding:18px;">
  <form method="post" class="kmt-form">
    {% csrf_token %}
    {{ form.as_p }}
    <div style="display:flex; gap:8px; margin-top:14px;">
      <button type="submit" class="btn btn-primary">Kaydet</button>
      <a href="{% url 'pruva:site_document_list' %}" class="btn btn-ghost">Vazgeç</a>
    </div>
  </form>
</div>
{% endblock %}
