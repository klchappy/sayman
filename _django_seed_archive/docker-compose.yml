# Sayman — Lokal dev Docker Compose
#
# Servisler:
#   - db   : PostgreSQL 16 (django-tenants postgresql_backend uyumlu)
#   - web  : Django (manage.py runserver, multi-tenant runtime)
#
# İlk kurulum:
#   docker compose up -d db
#   docker compose run --rm web python manage.py makemigrations tenancy
#   docker compose run --rm web python manage.py migrate_schemas --shared
#   docker compose run --rm web python manage.py bootstrap_sayman \
#       --org-name "Kılıç Holding" --org-slug kilic --ensure-public
#   docker compose run --rm web python manage.py migrate_schemas
#   docker compose run --rm web python manage.py createsuperuser
#   docker compose up web
#
# Subdomain dev (Windows): hosts dosyasına ekle:
#   127.0.0.1 localhost
#   127.0.0.1 kilic.localhost
#   127.0.0.1 tekstil.kilic.localhost
#   127.0.0.1 enerji.kilic.localhost
#   ... (her tenant için bir satır)

services:
  db:
    image: postgres:16-alpine
    container_name: sayman-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sayman_dev
      POSTGRES_USER: sayman_user
      POSTGRES_PASSWORD: sayman_pass
    volumes:
      - sayman_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sayman_user -d sayman_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sayman-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local_pg
      DJANGO_SECRET_KEY: dev-only-secret-CHANGE-IN-PROD-32chars-minimum-please
      DEBUG: "1"
      ALLOWED_HOSTS: ".localhost,localhost,127.0.0.1,web"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: sayman_dev
      DB_USER: sayman_user
      DB_PASSWORD: sayman_pass
    volumes:
      - ./backend:/app
    ports:
      - "8200:8000"
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

volumes:
  sayman_pgdata:
