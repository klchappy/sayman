{% extends "base.html" %}
{% block title %}Belediye · {{ BRAND_NAME }}{% endblock %}
{% block content %}
<div class="caption">Emlak Vergisi / Belediye</div>
<h1 style="margin:6px 0 14px;">Yeni Belediye</h1>

<form method="post" class="card" style="padding:16px; max-width:560px;">
  {% csrf_token %}
  {% for f in form %}
    <div style="margin-bottom:10px;">
      <label style="display:block; font-weight:600; font-size:13px;">{{ f.label }}</label>
      {{ f }}
      {% if f.errors %}<div class="status-tag danger">{{ f.errors|join:", " }}</div>{% endif %}
    </div>
  {% endfor %}
  <div style="display:flex; gap:8px;">
    <button class="btn btn-primary" type="submit">Kaydet</button>
    <a class="btn btn-ghost" href="{% url 'properties:municipality_list' %}">İptal</a>
  </div>
</form>
{% endblock %}
