{% extends "base.html" %}
{% block title %}{{ template.name }} · {{ BRAND_NAME }}{% endblock %}
{% block content %}
<h1>{{ template.name }}</h1>
<div class="muted" style="font-size:12px;">{{ template.get_report_type_display }} · {{ template.default_format }}</div>
<p>{{ template.description|default:"—" }}</p>
<div style="margin-top:8px;">
  <a class="btn" href="{% url 'reports:preview' %}?report_type={{ template.report_type }}">Preview</a>
  <a class="btn" href="{% url 'reports:export' %}?report_type={{ template.report_type }}&fmt={{ template.default_format }}">Export</a>
  <a class="btn btn-sm" href="{% url 'reports:template_edit' template.pk %}">Düzenle</a>
</div>
{% endblock %}
