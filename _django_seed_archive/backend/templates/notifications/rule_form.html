{% extends "base.html" %}
{% block title %}Bildirim Kuralı · {{ BRAND.name|default:BRAND_NAME }}{% endblock %}
{% block content %}
<h1>{% if object %}Kural Düzenle{% else %}Yeni Kural{% endif %}</h1>
<form method="post" class="card">{% csrf_token %}
  {{ form.as_p }}
  <button class="btn" type="submit">Kaydet</button>
  <a class="btn btn-ghost" href="{% url 'notifications:rule_list' %}">İptal</a>
</form>
{% endblock %}
