# /etc/nginx/sites-available/muhasebe-ops.conf
# Muhasebe Operasyonları — Nginx (taslak, Faz 16)
# SSL: certbot ile yönetilir; aşağıdaki ssl_* path'leri certbot tarafından yazılır.

upstream muhasebe_ops_app {
    server 127.0.0.1:8001 fail_timeout=0;
}

# 80 -> 443 redirect
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    # SSL (certbot tarafından doldurulur)
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Üst sınırlar — Django DATA_UPLOAD_MAX_MEMORY_SIZE=110MB ile uyumlu
    client_max_body_size 110m;
    client_body_timeout 60s;
    keepalive_timeout 65s;

    # Logs
    access_log /var/log/nginx/muhasebe-ops.access.log;
    error_log  /var/log/nginx/muhasebe-ops.error.log warn;

    # Static
    location /static/ {
        alias /var/www/muhasebe-ops/static/;
        expires 7d;
        access_log off;
    }

    # Public media (yoksa boş kalır)
    location /media/ {
        alias /var/www/muhasebe-ops/media/;
        expires 1d;
    }

    # private_media: nginx üzerinden DOĞRUDAN servis EDİLMEZ.
    # Tüm indirme akışı Django DocumentDownloadView üzerinden gider
    # (object-level permission + audit_log). X-Accel-Redirect ileri faza ertelendi.

    # Gunicorn upstream
    location / {
        proxy_pass         http://muhasebe_ops_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 60s;
    }

    # Güvenlik header'ları (Django da set ediyor; nginx fallback)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
}
