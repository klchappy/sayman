{% extends "base.html" %}
{% block title %}Belge Bağla · {{ statement.unit.code }}{% endblock %}

{% block content %}
<div class="caption">Site Aidatları / Ekstre / Belge</div>
<h1 style="margin:6px 0 14px;">Belge Bağla — {{ statement.unit.code }} {{ statement.period_label }}</h1>

<div class="card" style="padding:18px;">
  <form method="post" class="kmt-form">
    {% csrf_token %}
    {{ form.as_p }}
    <div style="display:flex; gap:8px; margin-top:14px;">
      <button class="btn btn-primary" type="submit">Bağla</button>
      <a href="{% url 'pruva:statement_detail' pk=statement.pk %}" class="btn btn-ghost">Vazgeç</a>
    </div>
  </form>
</div>
{% endblock %}
